# Local full-stack (optional). Easypanel: deploy api + web as two App services instead.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      FRONTEND_URL: "http://localhost:3000"
      GEMINI_MODEL: "gemini-2.5-flash"
    env_file:
      - path: backend/.env
        required: false
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: "http://localhost:8000"
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
