# Render Blueprint — https://render.com/docs/blueprint-spec
# Manual deploy (no rootDir): build = pip install -r requirements.txt
#                         start = bash start.sh

services:
  - type: web
    name: pacewell-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BUTTERBASE_APP_ID
        sync: false
      - key: BUTTERBASE_API_URL
        value: https://api.butterbase.ai
      - key: BUTTERBASE_API_KEY
        sync: false
